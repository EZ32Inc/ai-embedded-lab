- case_id: describe_test_stm32f401_001
  case_type: organic
  intent_type: test_detail_question
  user_question: "Please show me stm32f401rct6 golden GPIO test connections and what will be tested."
  expected_retrieval_path:
    - "python3 -m ael inventory describe-test --board stm32f401rct6 --test tests/plans/stm32f401_gpio_signature.json"
  must_use_formal_path: true
  required_output_elements:
    - "probe identity ESP32JTAG"
    - "connections including SWD, RESET, and observed signal"
    - "expected signal checks"
    - "current validation scope of the stm32f401 GPIO signature path"
  forbidden_failure_modes:
    - "using ad hoc repo reconstruction as the primary path"
    - "claiming multi-pin validation when only the PA4 signature path is checked"
    - "omitting what the test actually validates"
  judge_rubric:
    - "retrieval path used first is inventory describe-test"
    - "connections and expected checks are correctly summarized"
    - "limitations are not hidden or overstated"
    - "answer stays grounded in current repo state"
  notes: "Directly grounded in recent STM32F401 workflow."

