instance:
  id: fpga_x7a35t_capture
  type: esp32jtag
  label: ESP32JTAG FPGA Artix-7 Capture

connection:
  ip: 192.168.2.62
  gdb_port: 4242

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: wifi
      endpoint: 192.168.2.62:4242
      protocol: gdb_remote
      invocation_style: request_response
    - name: web_api
      transport: wifi
      endpoint: https://192.168.2.62:443
      protocol: esp32jtag_web_api_v1
      invocation_style: request_response
      auth:
        type: basic
      options:
        tls_verify: false

capability_surfaces:
  swd: gdb_remote
  gpio_in: web_api
  gpio_out: web_api
  adc_in: web_api
  reset_out: web_api

# PA35T StarLite wiring (JM1 connector → P0 port)
#   FPGA F13 (la_ch_in[0], 25MHz)    → P0.0
#   FPGA F14 (la_ch_in[1], 12.5MHz)  → P0.1
#   FPGA D14 (la_ch_in[2], 6.25MHz)  → P0.2
#   FPGA D15 (la_ch_in[3], 3.125MHz) → P0.3
#   FPGA GND                         → GND
