instance:
  id: s3jtag_rp2040_lab
  type: esp32jtag
  label: S3JTAG RP2040 Lab

connection:
  ip: 192.168.2.251
  gdb_port: 4242

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: wifi
      endpoint: 192.168.2.251:4242
      protocol: gdb_remote
      invocation_style: request_response
    - name: web_api
      transport: wifi
      endpoint: https://192.168.2.251:443
      protocol: esp32jtag_web_api_v1
      invocation_style: request_response
      auth:
        type: basic
      options:
        tls_verify: false
    - name: uart_websocket
      transport: wifi
      endpoint: wss://192.168.2.251/ws
      protocol: websocket
      invocation_style: bidirectional_stream

capability_surfaces:
  swd: gdb_remote
  gpio_in: web_api
  gpio_out: web_api
  reset_out: web_api
  uart: uart_websocket

preflight:
  capture_check: targetin
