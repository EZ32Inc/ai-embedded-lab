instance:
  id: esp32jtag_rp2040_lab
  type: esp32jtag
  label: ESP32JTAG RP2040 Lab

connection:
  ip: 192.168.2.63
  gdb_port: 4242

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: wifi
      endpoint: 192.168.2.63:4242
      protocol: gdb_remote
      invocation_style: request_response
    - name: web_api
      transport: wifi
      endpoint: https://192.168.2.63:443
      protocol: esp32jtag_web_api_v1
      invocation_style: request_response
      auth:
        type: basic
      options:
        tls_verify: false
