instance:
  id: stlink_f407_discovery
  type: stlink
  label: ST-Link — STM32F4 Discovery (local USB)

connection:
  ip: "127.0.0.1"
  gdb_port: 4242

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: usb_local
      endpoint: "127.0.0.1:4242"
      protocol: gdb_remote
      invocation_style: request_response

capability_surfaces:
  swd: gdb_remote
