instance:
  id: esp32s3_dev_c_meter
  type: esp32_meter
  label: ESP32-S3 Dev C Meter

connection:
  ip: "192.168.4.1"
  tcp_port: 9000

communication:
  primary: meter_tcp
  surfaces:
    - name: meter_tcp
      transport: wifi
      endpoint: "192.168.4.1:9000"
      protocol: gpio_meter_v1
      invocation_style: request_response

capability_surfaces:
  gpio_in: meter_tcp
  adc_in: meter_tcp
  gpio_out: meter_tcp
