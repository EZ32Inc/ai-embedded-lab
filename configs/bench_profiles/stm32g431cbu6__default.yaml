bench_profile:
  id: stm32g431cbu6__default
  board_id: stm32g431cbu6
  description: "GPIO waveform wiring: PA2â†’P0.3, PA3â†’P0.0, PA4â†’P0.2, PB3â†’P0.1, PA8â†’LED"

  bench_connections:
    - from: PA2
      to: P0.3
    - from: PA3
      to: P0.0
    - from: PA4
      to: P0.2
    - from: PB3
      to: P0.1
    - from: PA8
      to: LED
    - from: GND
      to: probe GND

  observe_map:
    sig: P0.3
    pa2: P0.3
    pa3: P0.0
    pa4: P0.2
    pb3: P0.1
    spi_sck: P0.1
    led: LED
    pa8: LED

  verification_views:
    signal:
      pin: sig
      resolved_to: P0.3
      description: GPIO signature capture on PA2 (~250Hz primary signal)
    led:
      pin: led
      resolved_to: LED
      description: Operator-visible PA8 LED blink (1Hz, active-high)

  default_wiring:
    swd: "P3"
    reset: "NC"
    verify: "P0.3"

  safe_pins:
    - PA2
    - PA3
    - PA4
    - PA8
    - PB3
