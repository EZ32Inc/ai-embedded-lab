bench_profile:
  id: stm32f401ce_blackpill__default
  board_id: stm32f401ce_blackpill
  description: "GPIO waveform wiring: PA2→P0.0, PC13→LED"

  bench_connections:
    - from: PA2
      to: P0.0
    - from: PC13
      to: LED
    - from: GND
      to: probe GND

  observe_map:
    sig: P0.0
    pa2: P0.0
    led: LED

  verification_views:
    signal:
      pin: sig
      resolved_to: P0.0
      description: PA2 signature output for optional logic capture
    led:
      pin: led
      resolved_to: LED
      description: Onboard PC13 LED blink

  default_wiring:
    swd: "P3"
    reset: "NC"
    verify: "P0.0"

  safe_pins:
    - PA2
    - PA3
    - PA4
    - PA5
    - PA6
    - PA7
    - PA8
    - PA9
    - PA10
    - PB0
    - PB1
    - PB6
    - PB7
    - PB8
    - PB9
    - PC13
