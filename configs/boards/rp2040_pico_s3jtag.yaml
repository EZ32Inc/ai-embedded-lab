board:
  name: RP2040 Pico via S3JTAG
  target: rp2040
  kind: board
  features:
    - programmable_via_swd
    - has_gpio
  processors:
    - id: rp2040
      arch: arm
      role: primary
      clock_hz: 125000000
  instrument_instance: s3jtag_rp2040_lab
  build:
    project_dir: firmware/targets/rp2040_pico
    artifact_stem: pico_blink
    build_dir: artifacts/build_rp2040_pico_s3jtag
  firmware:
    description: RP2040 GPIO-signature target exercised through S3JTAG SWD + Target In
  observe_map:
    sig: TARGETIN
    targetin: TARGETIN
  default_wiring:
    swd: P3
    reset: NC
    verify: TARGETIN
  verification_views:
    signal:
      pin: sig
      resolved_to: TARGETIN
      description: Target GPIO observed on S3JTAG TARGETIN (GPIO15)
  bench_connections:
    - from: RP2040 SWDIO
      to: S3JTAG P3.SWDIO
    - from: RP2040 SWCLK
      to: S3JTAG P3.SWCLK
    - from: RP2040 GPIO output under test
      to: TARGETIN
    - from: GND
      to: S3JTAG GND
  power_and_boot:
    reset_strategy: none
    boot_mode_default: normal
    power_rails:
      - name: 3V3
        nominal_v: 3.3
