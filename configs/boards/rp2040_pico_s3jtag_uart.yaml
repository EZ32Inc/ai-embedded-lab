board:
  name: RP2040 Pico via S3JTAG SWD + Internal UART
  target: rp2040
  kind: board
  features:
    - programmable_via_swd
    - has_gpio
    - has_uart_console
  processors:
    - id: rp2040
      arch: arm
      role: primary
      clock_hz: 125000000
  instrument_instance: s3jtag_rp2040_lab
  build:
    project_dir: assets_golden/duts/rp2040_pico/uart_banner_s3jtag/firmware
    artifact_stem: pico_uart_banner_s3jtag
    build_dir: artifacts/build_rp2040_uart_banner_s3jtag
  firmware:
    description: RP2040 UART banner target exercised through S3JTAG SWD plus the ESP32-S3 devkit internal Web UART bridge
  default_wiring:
    swd: P3
    reset: NC
    verify: "NC"
  bench_connections:
    - from: RP2040 SWDIO
      to: S3JTAG P3.SWDIO
    - from: RP2040 SWCLK
      to: S3JTAG P3.SWCLK
    - from: RP2040 UART0 TX
      to: S3JTAG UART1 RX (GPIO7)
    - from: RP2040 UART0 RX
      to: S3JTAG UART1 TX (GPIO6)
    - from: GND
      to: S3JTAG GND
  power_and_boot:
    reset_strategy: none
    boot_mode_default: normal
    power_rails:
      - name: 3V3
        nominal_v: 3.3
