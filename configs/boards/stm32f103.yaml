board:
  name: STM32F103 Bluepill
  target: stm32f103c8t6
  firmware:
    description: Toggle PA4-PA7 fast, blink PC13
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    target_id: 1
  observe_map:
    sig: PA0
    pa4: PA0
    pa5: PA1
    pa6: PA2
    pa7: PA3
  safe_pins:
    - PA4
    - PA5
    - PA6
    - PA7
    - PC13
  default_wiring:
    swd: "P3"
    reset: "NC"
    verify: "PA0"
