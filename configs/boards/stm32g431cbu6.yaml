board:
  name: STM32G431CBU6
  target: stm32g431cbu6
  instrument_instance: esp32jtag_g431_bench
  clock_hz: 16000000
  kind: board
  features:
    - programmable_via_swd
    - has_reset_pin
    - has_gpio
  default_bench_profile: stm32g431cbu6__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32g431cbu6
    artifact_stem: stm32g431_app
  firmware:
    description: PA2 ~250Hz primary signal, PA3 ~125Hz secondary, PA8 LED active-high 1Hz blink
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 20.0
    target_id: 1
    reset_available: false
    gdb_launch_cmds:
      - "monitor a"
      - "file {firmware}"
      - "attach {target_id}"
      - "load"
      - "set *(unsigned int*)0xE000EDF0 = 0xA05F0001"
      - "detach"
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3
