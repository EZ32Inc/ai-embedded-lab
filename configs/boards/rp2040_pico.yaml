board:
  name: RP2040 Pico
  target: rp2040
  instrument_instance: esp32jtag_rp2040_lab
  build:
    project_dir: firmware/targets/rp2040_pico
    artifact_stem: pico_blink
    build_dir: artifacts/build_rp2040_pico
  firmware:
    description: Blink GPIO25 ~1Hz
  observe_map:
    sig: P0.0
    gpio16: P0.0
    gpio17: P0.1
    gpio18: P0.2
    gpio19: P0.3
  default_wiring:
    swd: "P3"
    reset: "P2.0"
    verify: "P0.0"
  verification_views:
    signal:
      pin: sig
      resolved_to: P0.0
      description: Generic GPIO signature capture on GPIO16
  bench_connections:
    - from: GPIO16
      to: P0.0
    - from: GPIO17
      to: P0.1
    - from: GPIO18
      to: P0.2
    - from: GPIO19
      to: P0.3
    - from: GND
      to: probe GND
  power_and_boot:
    reset_strategy: pulse_reset
    boot_mode_default: normal
    power_rails:
      - name: 3V3
        nominal_v: 3.3
