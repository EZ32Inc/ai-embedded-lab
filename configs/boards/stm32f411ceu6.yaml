board:
  name: STM32F411CEU6 WeAct Black Pill V2.0
  target: stm32f411ceu6
  instrument_instance: esp32jtag_stm32f411
  clock_hz: 16000000
  kind: board
  features:
    - programmable_via_swd
    - has_reset_pin
    - has_gpio
  default_bench_profile: stm32f411ceu6__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32f411ceu6
    artifact_stem: stm32f411_app
  firmware:
    description: Provisional STM32F411CEU6 WeAct Black Pill target with PA2/PA3 proof pins and PC13 LED
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 5.0
    target_id: 1
    gdb_launch_cmds:
      - "file {firmware}"
      - "monitor a"
      - "attach {target_id}"
      - "load"
      - "attach {target_id}"
      - "detach"
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3
