board:
  name: STM32F401RCT6
  target: stm32f401rct6
  instrument_instance: esp32jtag_blackpill_192_168_2_106
  clock_hz: 16000000
  default_bench_profile: stm32f401rct6__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32f401rct6
    artifact_stem: stm32f401_app
  firmware:
    description: STM32F401RCT6 GPIO signature and banner experiment suite
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 5.0
    target_id: 1
    gdb_launch_cmds:
      - "file {firmware}"
      - "monitor a"
      - "attach {target_id}"
      - "load"
      - "attach {target_id}"
      - "detach"
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3
