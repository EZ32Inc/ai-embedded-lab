probe:
  name: ESP32JTAG
  transport: wifi
  wifi_mode: ST
  web_scheme: https
  web_port: 443
  web_user: admin
  web_pass: admin
  web_verify_ssl: false
  web_suppress_ssl_warnings: true

connection:
  ip: 192.168.2.63
  gdb_port: 4242

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: wifi
      endpoint: 192.168.2.63:4242
      protocol: gdb_remote
      invocation_style: request_response
    - name: web_api
      transport: wifi
      endpoint: https://192.168.2.63:443
      protocol: esp32jtag_web_api_v1
      invocation_style: request_response
      auth:
        type: basic
      options:
        tls_verify: false

gdb_cmd: "arm-none-eabi-gdb"

ports:

  P0:
    lines:
      0:
        capabilities: [gpio_in, gpio_out]
      1:
        capabilities: [gpio_in]
        recommended_use: verify_input

  P1:
    lines:
      0:
        capabilities: [adc_in]
        note: analog sampling
      1:
        capabilities: [gpio_in, gpio_out]

  P2:
    lines:
      0:
        capabilities: [reset_out]
        drive: open_drain
        recommended_use: target_reset
      1:
        capabilities: [gpio_out]

  P3:
    capabilities: [swd]
    signals:
      swdio: true
      swclk: true

features:

  sampling:
    digital:
      max_rate_hz: 10000000
      buffer_kb: 1024

  logic_analyzer:
    supported: true
    max_rate_hz: 264000000
    buffer_kb: 1024

  adc:
    supported: true

defaults:
  swd_port: P3
  reset_line: P2.0
  verify_gpio: P0.1
