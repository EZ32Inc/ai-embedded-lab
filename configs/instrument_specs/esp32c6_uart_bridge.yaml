# Instrument Spec v1 — ESP32-C6 UART0 via CH341 USB bridge
#
# Corresponds to the CH341 USB-to-UART bridge chip on dual-USB ESP32-C6 boards.
# Appears as /dev/ttyACM* with Vendor=1a86, Model=USB_Single_Serial.
# Receives primary UART0 console output (CONFIG_ESP_CONSOLE_UART_DEFAULT).

schema_version: 1

instrument:
  id: esp32c6_uart_bridge
  kind: uart_bridge

  capabilities:
    - uart_txrx

  actions:
    - name: uart_wait_for
      backend: pyserial
      params: [port, baudrate, pattern, timeout]
