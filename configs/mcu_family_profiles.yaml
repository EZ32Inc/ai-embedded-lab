# MCU family profiles for draft capability bootstrap.
# Keyed by name prefix (lowercase). First match wins.
# Fields: family, build_type, flash_method, instrument_hint
profiles:
  - prefix: "stm32"
    family: "stm32"
    build_type: "arm_debug"
    flash_method: "gdb_swd"
    instrument_hint: "esp32jtag or st-link (SWD)"
  - prefix: "rp2"
    family: "rp2040"
    build_type: "pico"
    flash_method: "gdb_swd"
    instrument_hint: "picoprobe or SWD adapter"
  - prefix: "rp_"
    family: "rp2040"
    build_type: "pico"
    flash_method: "gdb_swd"
    instrument_hint: "picoprobe or SWD adapter"
  - prefix: "esp32"
    family: "esp32"
    build_type: "idf"
    flash_method: "idf_esptool"
    instrument_hint: "USB/UART or ESP-PROG"
  - prefix: "esp8266"
    family: "esp8266"
    build_type: "idf"
    flash_method: "idf_esptool"
    instrument_hint: "USB/UART"
  - prefix: "nrf5"
    family: "nrf5x"
    build_type: "arm_debug"
    flash_method: "gdb_swd"
    instrument_hint: "J-Link or SWD adapter"
